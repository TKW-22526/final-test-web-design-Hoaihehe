<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liên Hệ - Cửa Hàng</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        /* CSS nội bộ thêm cho form liên hệ */
        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 500px;
            margin: 0 auto;
        }
        .contact-form input, .contact-form textarea {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            width: 100%;
        }
        .contact-form textarea {
            resize: vertical;
            min-height: 100px;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <img src="../images/logo.jpg" alt="Logo Cửa Hàng">
        </div>
       <nav>
    <ul>
        <li><a href="../index.html">Trang chủ</a></li>
        <li><a href="san-pham.html">Sản phẩm</a></li>
        <li><a href="gioi-thieu.html">Giới thiệu</a></li>
        <li><a href="lien-he.html">Liên hệ</a></li>
        <li><a href="gio-hang.html">Giỏ hàng <span id="cart-count">0</span></a></li>
    </ul>
</nav>

<script src="../js/script.js"></script>
    </header>

    <main>
        <section class="products-container" style="background: #fff; padding: 40px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
            <h2>Liên Hệ Với Chúng Tôi</h2>
            <p style="text-align: center; margin-bottom: 20px;">Hãy để lại lời nhắn, chúng tôi sẽ phản hồi bạn sớm nhất có thể!</p>
            
            <form class="contact-form" action="#" method="POST">
                <input type="text" name="name" placeholder="Họ và tên của bạn" required>
                <input type="email" name="email" placeholder="Email của bạn" required>
                <textarea name="message" placeholder="Nội dung tin nhắn..." required></textarea>
                <button type="submit" class="btn-buy">Gửi Tin Nhắn</button>
            </form>
        </section>
    </main>
<nav>
 
</nav>

        <p>&copy; 2026 Cửa Hàng Của Bạn. Mọi quyền được bảo lưu.</p>
    </footer>
</body>
</html>
