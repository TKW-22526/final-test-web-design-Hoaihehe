<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sản Phẩm - Cửa Hàng</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    
    <header>
        <div class="logo">
            <img src="../images/logo.jpg" alt="Logo Cửa Hàng">
        </div>
        <nav>
            <ul>
                <li><a href="../index.html">Trang chủ</a></li>
                <li><a href="san-pham.html">Sản phẩm</a></li>
                <li><a href="gioi-thieu.html">Giới thiệu</a></li>
                <li><a href="lien-he.html">Liên hệ</a></li>
                <li><a href="gio-hang.html">Giỏ hàng <span id="cart-count">0</span></a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="products-container">
            <h2>Danh Sách Sản Phẩm</h2>
            <div class="product-grid">
                
                <div class="product-card">
                    <div class="product-image">
                        <span>Ảnh 1</span>
                    </div>
                    <h3>Sản Phẩm A</h3>
                    <p class="price">250.000 VNĐ</p>
                    
                    <div class="quantity-selector" style="margin-bottom: 15px;">
                        <label>Số lượng: </label>
                        <input type="number" class="qty-input" value="1" min="1" max="99" style="width: 60px; padding: 5px; text-align: center; border-radius: 4px; border: 1px solid #ccc;">
                    </div>

                    <div class="button-group">
                        <a href="chi-tiet.html" class="btn-detail">Chi tiết</a>
                        <button class="btn-buy">Mua Ngay</button>
                    </div>
                </div>

                <div class="product-card">
                    <div class="product-image">
                        <span>Ảnh 2</span>
                    </div>
                    <h3>Sản Phẩm B</h3>
                    <p class="price">400.000 VNĐ</p>
                    
                    <div class="quantity-selector" style="margin-bottom: 15px;">
                        <label>Số lượng: </label>
                        <input type="number" class="qty-input" value="1" min="1" max="99" style="width: 60px; padding: 5px; text-align: center; border-radius: 4px; border: 1px solid #ccc;">
                    </div>

                    <div class="button-group">
                        <a href="chi-tiet.html" class="btn-detail">Chi tiết</a>
                        <button class="btn-buy">Mua Ngay</button>
                    </div>
                </div>

                <div class="product-card">
                    <div class="product-image">
                        <span>Ảnh 3</span>
                    </div>
                    <h3>Sản Phẩm C</h3>
                    <p class="price">150.000 VNĐ</p>
                    
                    <div class="quantity-selector" style="margin-bottom: 15px;">
                        <label>Số lượng: </label>
                        <input type="number" class="qty-input" value="1" min="1" max="99" style="width: 60px; padding: 5px; text-align: center; border-radius: 4px; border: 1px solid #ccc;">
                    </div>

                    <div class="button-group">
                        <a href="chi-tiet.html" class="btn-detail">Chi tiết</a>
                        <button class="btn-buy">Mua Ngay</button>
                    </div>
                </div>

            </div> </section>
    </main>

    <footer>
        <p>&copy; 2026 Cửa Hàng Của Bạn. Mọi quyền được bảo lưu.</p>
    </footer>
